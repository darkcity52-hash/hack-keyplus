name: Build Hack Keyboard APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cachear Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: ${{ runner.os }}-buildozer-v3-${{ hashFiles('buildozer.spec') }}

      - name: Instalar dependencias
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential git python3-dev python3-pip libncurses5-dev libffi-dev libssl-dev libltdl-dev libtool pkg-config autoconf automake ccache cmake zip unzip
          pip3 install --user --upgrade Cython==0.29.36 buildozer==1.5.1 virtualenv

      - name: Compilar APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export APP_ANDROID_ACCEPT_SDK_LICENSE=True
          mkdir -p bin
          buildozer android debug || buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: HackKeyboard-Pro-APK
          path: bin/*.apk
